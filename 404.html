<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>Page not found — mpz</title>
        <meta name="robots" content="noindex" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta
            name="theme-color"
            content="#f5f5f5"
            media="(prefers-color-scheme: light)"
        />
        <meta
            name="theme-color"
            content="#363636"
            media="(prefers-color-scheme: dark)"
        />

        <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
        <link rel="icon" href="/favicon.ico" sizes="any" />
        <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
        <link rel="stylesheet" href="/styles.css" />

        <script>
            (function () {
                var t = localStorage.getItem("theme");
                if (t === "light" || t === "dark")
                    document.documentElement.dataset.theme = t;
            })();
        </script>
    </head>

    <body>
        <header>
            <section class="hero is-dark is-bold is-small">
                <div class="hero-body">
                    <div class="container">
                        <h1 class="title">mpz</h1>
                        <p class="subtitle">
                            Music player for large local collections
                        </p>
                    </div>
                </div>
            </section>
        </header>

        <main>
            <section class="section">
                <div class="container">
                    <h2 class="title">Page not found</h2>
                    <div class="content">
                        <p>
                            The page you were looking for doesn't exist or has
                            moved.
                        </p>
                        <p>
                            <a href="/">Go to the mpz home page</a> or visit the
                            <a
                                href="https://github.com/olegantonyan/mpz"
                                target="_blank"
                                rel="noopener noreferrer"
                                >project on GitHub</a
                            >.
                        </p>
                    </div>
                </div>
            </section>
        </main>
    </body>
</html>
