name: Release macOS dmg

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Existing release tag to upload the DMG to (leave empty for a normal CI build)'
        required: false
        type: string
        default: ''
  release:
    types: [published]

defaults:
  run:
    shell: bash

env:
  RELEASE_TAG: ${{ github.event.release.tag_name || github.event.inputs.release_tag }}

jobs:
  qt6:
    name: Qt6 arm64+x86_64 universal
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.10.3
          host: mac
          target: desktop
          arch: clang_64
          modules: 'qtmultimedia'
          tools: 'tools_ninja tools_cmake'

      - name: Extract version
        id: ver
        run: echo "version=$(./win/_extract_version.sh)" >> "$GITHUB_OUTPUT"

      - name: Compute PACKAGE_VERSION (non-release builds)
        if: env.RELEASE_TAG == ''
        run: |
          PV=$(printf 'next.%s.%s' $(git log -1 --format='%cd %h' --date=format:'%Y%m%d%H%M%S'))
          echo "PACKAGE_VERSION=$PV" >> "$GITHUB_ENV"
          echo "ARTIFACT_SUFFIX=-$PV" >> "$GITHUB_ENV"

      - name: Build
        env:
          QTDIR: ${{ env.QT_ROOT_DIR }}
          MPZ_OUTPUT_DIR: ${{ github.workspace }}/dist
        run: |
          mkdir -p "$MPZ_OUTPUT_DIR"
          ./mac/portable_macos_qt6_host.sh

      - name: Inspect bundle
        run: |
          APP="$MPZ_OUTPUT_DIR/mpz music player.app"
          echo "--- bundle tree ---"
          find "$APP" -maxdepth 3 -print
          echo "--- Info.plist ---"
          plutil -p "$APP/Contents/Info.plist"
          echo "--- arch slices (executable) ---"
          lipo -info "$APP/Contents/MacOS/mpz"
          echo "--- arch slices (Qt frameworks) ---"
          find "$APP/Contents/Frameworks" -name '*.framework' -maxdepth 2 -print | while read fw; do
            bin="$fw/Versions/A/$(basename "$fw" .framework)"
            [ -f "$bin" ] && lipo -info "$bin"
          done | head -20
          echo "--- linked libs (non-system) ---"
          otool -L "$APP/Contents/MacOS/mpz" | grep -vE '^\s*(/System/|/usr/lib/)' || true
          echo "--- codesign verify ---"
          codesign --verify --deep --strict --verbose=2 "$APP" || true
        env:
          MPZ_OUTPUT_DIR: ${{ github.workspace }}/dist

      - name: Upload as workflow artifact (non-release builds)
        if: env.RELEASE_TAG == ''
        uses: actions/upload-artifact@v7
        with:
          path: dist/mpz-${{ steps.ver.outputs.version }}${{ env.ARTIFACT_SUFFIX }}-macos-universal-qt6.dmg
          archive: false

      - name: Generate signed appcast
        if: env.RELEASE_TAG != ''
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
          MPZ_OUTPUT_DIR: ${{ github.workspace }}/dist
        run: |
          if [ -z "${SPARKLE_ED_PRIVATE_KEY:-}" ] || [ ! -d 3rdparty/Sparkle-2.9.3/Sparkle.xcodeproj ]; then
            echo "Sparkle source or signing key missing - skipping appcast"
            exit 0
          fi
          xcodebuild -project 3rdparty/Sparkle-2.9.3/Sparkle.xcodeproj \
            -scheme generate_appcast -configuration Release \
            -derivedDataPath "$RUNNER_TEMP/sparkle-tools" \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO -quiet build
          GEN="$RUNNER_TEMP/sparkle-tools/Build/Products/Release/generate_appcast"
          KEYFILE="$RUNNER_TEMP/sparkle_ed_priv"
          printf '%s' "$SPARKLE_ED_PRIVATE_KEY" > "$KEYFILE"
          "$GEN" \
            --ed-key-file "$KEYFILE" \
            --download-url-prefix "https://github.com/${{ github.repository }}/releases/download/$RELEASE_TAG/" \
            --link "https://github.com/${{ github.repository }}/releases" \
            -o "$MPZ_OUTPUT_DIR/appcast.xml" \
            "$MPZ_OUTPUT_DIR"
          rm -f "$KEYFILE"

      - name: Upload to GitHub release
        if: env.RELEASE_TAG != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ASSETS=("dist/mpz-${{ steps.ver.outputs.version }}-macos-universal-qt6.dmg")
          [ -f dist/appcast.xml ] && ASSETS+=("dist/appcast.xml")
          gh release upload "$RELEASE_TAG" "${ASSETS[@]}" --repo "${{ github.repository }}" --clobber
