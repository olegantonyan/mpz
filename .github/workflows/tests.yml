name: tests

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  unit:
    name: unit tests (${{ matrix.qt }}, Ubuntu 24.04)
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        include:
          - qt: Qt6
            preset: debug-qt6-tests
            packages: qt6-base-dev qt6-multimedia-dev
          - qt: Qt5
            preset: debug-qt5-tests
            packages: qtbase5-dev qtmultimedia5-dev

    env:
      QT_QPA_PLATFORM: offscreen

    steps:
      - uses: actions/checkout@v6

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            ${{ matrix.packages }}

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build test targets
        run: cmake --build build/${{ matrix.preset }} --target build_tests

      - name: Run ctest
        run: ctest --test-dir build/${{ matrix.preset }} --output-on-failure
