name: Image cache refresh

on:
  workflow_dispatch:
  schedule:
    - cron: '44 6 1 * *'

permissions:
  packages: write

jobs:
  list-distros:
    runs-on: ubuntu-latest
    outputs:
      distros: ${{ steps.get-distros.outputs.distros }}
    steps:
      - uses: omnipackage/omnipackage-rs@master
      - uses: actions/checkout@v6
      - name: Get distro list
        id: get-distros
        run: echo "distros=$(omnipackage info --list-distros . --format json)" >> "$GITHUB_OUTPUT"

  image_cache:
    needs: [list-distros]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        distro: ${{ fromJson(needs.list-distros.outputs.distros) }}
    steps:
      - uses: omnipackage/omnipackage-rs@master
      - uses: actions/checkout@v6
      - run: echo "${{ secrets.OMNIPACKAGE_MPZ_DOTENV }}" > .env
      - run:  omnipackage prime . --image-cache github --distros "${{ matrix.distro }}"
