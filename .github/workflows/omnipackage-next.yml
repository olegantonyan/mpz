name: Release Linux packages - next

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths-ignore:
      - README.md
      - CHANGELOG.md
      - CODE_OF_CONDUCT.md
      - license.txt
      - run.sh

jobs:
  run:
    uses: ./.github/workflows/_omnipackage.yml
    secrets: inherit
    with:
      repository: "Linux packages - next"
      version_extractor: "git"
