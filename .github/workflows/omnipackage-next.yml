name: Build and publish packages via OmniPackage

on:
  workflow_dispatch:
  push:
    branches: [ master ]

jobs:
  run:
    runs-on: ubuntu-latest
    concurrency:
      group: omnipackage-next
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - run: echo "${{ secrets.OMNIPACKAGE_MPZ_DOTENV }}" > .env

      - uses: omnipackage/omnipackage-rs/.github/actions/setup@master
        with:
          version: master

      - run: omnipackage release . --repository "Cloudflare R2 next"