name: Release Linux packages - stable

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  x86_64:
    uses: ./.github/workflows/_omnipackage.yml
    secrets: inherit
    with:
      repository: "Linux packages - stable"
      version_extractor: "stable"
      arch: "x86_64"
      runs_on: "ubuntu-24.04"

  aarch64:
    uses: ./.github/workflows/_omnipackage.yml
    secrets: inherit
    with:
      repository: "Linux packages AARCH64 - stable"
      version_extractor: "stable"
      arch: "aarch64"
      runs_on: "ubuntu-24.04-arm"
      # arch: no arm64 image. manjaro: Manjaro ARM repos frozen ~2024
      skip_distros: '["arch", "manjaro"]'
