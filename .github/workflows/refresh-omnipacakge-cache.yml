name: Image cache refresh

on:
  workflow_dispatch:
    inputs:
      image_cache:
        required: true
        type: string
        default: github

permissions:
  packages: write

jobs:
  list-distros:
    runs-on: ubuntu-24.04
    outputs:
      distros: ${{ steps.get-distros.outputs.distros }}
    steps:
      - name: Install omnipackage
        run: |
          echo 'deb https://repositories.omnipackage.org/omnipackage-rs/master/ubuntu_24.04 stable/' | sudo tee /etc/apt/sources.list.d/omnipackage_omnipackage.list
          curl -fsSL https://repositories.omnipackage.org/omnipackage-rs/master/ubuntu_24.04/stable/Release.key | gpg --dearmor | sudo tee /etc/apt/trusted.gpg.d/omnipackage_omnipackage.gpg > /dev/null
          sudo apt-get update
          sudo apt-get install omnipackage

      - uses: actions/checkout@v6

      - name: Get distro list
        id: get-distros
        run: echo "distros=$(omnipackage info --list-distros . --format json)" >> "$GITHUB_OUTPUT"

  image_cache:
    needs: [bootstrap-binary, list-distros]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        distro: ${{ fromJson(needs.list-distros.outputs.distros) }}
    steps:
      - uses: actions/checkout@v6
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq podman gpg
      - uses: actions/download-artifact@v8
        with:
          name: omnipackage-binary
          path: /usr/local/bin
      - run: chmod +x /usr/local/bin/omnipackage
      - run: echo "${{ secrets.OMNIPACKAGE_DOTENV }}" > .env
      - run: |
          echo "GITHUB_REGISTRY_USERNAME=${{ github.actor }}" >> .env
          echo "GITHUB_REGISTRY_PASSWORD=${{ secrets.GITHUB_TOKEN }}" >> .env
      - run:  omnipackage image-cache refresh . --image-cache "${{ inputs.image_cache }}" --distros "${{ matrix.distro }}"
